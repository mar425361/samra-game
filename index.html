<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة سين جيم الكبرى - الشاشة الرئيسية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #07090e 100%);
            color: #ffffff; min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 20px; overflow: hidden;
        }

        header { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; margin-bottom: 5px; }
        h1 { font-size: 2.2rem; color: #fbbf24; text-shadow: 0 0 30px rgba(251, 191, 36, 0.6); font-weight: 900; letter-spacing: 1px; }
        .logo-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 1rem; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }

        .main-container { display: flex; width: 98%; max-width: 1450px; gap: 20px; align-items: stretch; margin: auto; }
        
        .card {
            flex: 2.7; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px);
            border: 3px solid rgba(251, 191, 36, 0.35); border-radius: 28px; padding: 35px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.85), inset 0 0 40px rgba(59, 130, 246, 0.1); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; min-height: 500px; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #3b82f6, #fbbf24, #ef4444, #10b981);
        }
        
        .category-tag { font-size: 1.5rem; color: #38bdf8; font-weight: 900; margin-bottom: 20px; background: rgba(56, 189, 248, 0.12); padding: 8px 28px; border-radius: 50px; border: 2px solid rgba(56,189,248,0.4); box-shadow: 0 0 20px rgba(56,189,248,0.25); }
        
        /* تأثيرات التصادم العملاقة */
        .clash-container {
            display: flex; align-items: center; justify-content: center; gap: 30px; width: 100%; margin: 20px 0;
            position: relative;
        }
        .fighter {
            font-size: 2.2rem; font-weight: 900; padding: 22px 35px; border-radius: 20px; background: rgba(15, 23, 42, 0.95);
            border: 3px solid #3b82f6; box-shadow: 0 0 30px rgba(59,130,246,0.4); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            max-width: 42%; word-break: break-word; position: relative; z-index: 10;
        }
        .fighter.team2 { border-color: #fbbf24; box-shadow: 0 0 30px rgba(251,191,36,0.4); }
        .vs-badge { font-size: 3.8rem; font-weight: 900; color: #ef4444; text-shadow: 0 0 40px rgba(239,68,68,0.95); z-index: 10; transition: all 0.3s; }

        .explosion-effect {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 350px; height: 350px; background: radial-gradient(circle, #fbbf24 10%, #ef4444 35%, transparent 70%);
            opacity: 0; border-radius: 50%; pointer-events: none; z-index: 5; filter: blur(12px);
        }
        .smoke-effect {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 450px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,0.45) 10%, rgba(100,100,100,0.2) 40%, transparent 70%);
            opacity: 0; pointer-events: none; z-index: 4; filter: blur(22px);
        }

        .clash-active .fighter.team1 { transform: translateX(110px) scale(1.3) rotate(-6deg); }
        .clash-active .fighter.team2 { transform: translateX(-110px) scale(1.3) rotate(6deg); }
        .clash-active .vs-badge { transform: scale(2.4); opacity: 0; }
        
        .clash-active .explosion-effect { animation: explodeAnime 0.6s ease-out forwards; }
        .clash-active .smoke-effect { animation: smokeAnime 1.2s ease-out forwards; }
        .screen-shake { animation: shakeHard 0.6s ease-in-out; }

        @keyframes explodeAnime {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
        }
        @keyframes smokeAnime {
            0% { transform: translate(-50%, -60%) scale(0.2); opacity: 0.7; }
            100% { transform: translate(-50%, -60%) scale(2); opacity: 0; }
        }
        @keyframes shakeHard {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-22px, 12px); }
            20% { transform: translate(22px, -12px); }
            30% { transform: translate(-16px, -10px); }
            40% { transform: translate(16px, 10px); }
            50% { transform: translate(-12px, 6px); }
            60% { transform: translate(12px, -6px); }
            80% { transform: translate(6px, 3px); }
        }

        /* المحتوى والأسئلة */
        .content-box { display: none; width: 100%; flex-direction: column; gap: 20px; align-items: center; }
        .question-text { font-size: 2.4rem; line-height: 1.5; color: #f8fafc; font-weight: 700; max-width: 95%; }
        .answer-text {
            font-size: 2rem; color: #34d399; background: rgba(16, 185, 129, 0.15);
            padding: 14px 35px; border-radius: 18px; border: 2px dashed #10b981; display: none;
            animation: popUp 0.4s ease-in-out; box-shadow: 0 0 25px rgba(16,185,129,0.25);
        }

        @keyframes popUp {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* اللوحات الجانبية */
        .scores-section { flex: 1; display: flex; flex-direction: column; gap: 15px; justify-content: center; }
        .score-box {
            background: rgba(15, 23, 42, 0.85); border: 2px solid rgba(255,255,255,0.12);
            border-radius: 22px; padding: 22px; display: flex; flex-direction: column;
            align-items: center; gap: 8px; box-shadow: 0 15px 30px rgba(0,0,0,0.6); position: relative; overflow: hidden;
        }
        .score-box::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; }
        .team1-box::after { background: #3b82f6; }
        .team2-box::after { background: #fbbf24; }
        .team-name { font-size: 1.4rem; color: #94a3b8; font-weight: 700; }
        .team-score { font-size: 3.4rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.35); }

        .qr-section {
            flex: 0.85; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            border: 2px solid rgba(251, 191, 36, 0.25); border-radius: 24px;
            padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #qrcode { background: #fff; padding: 12px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .status { font-size: 0.95rem; color: #34d399; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>

    <header>
        <h1>🎙️ برنامج سين جيم الأسطوري</h1>
        <div class="logo-badge">النسخة الكبرى</div>
    </header>

    <div class="main-container">
        <div class="card" id="mainCard">
            <div class="category-tag" id="categoryTag">امسح كود الـ QR بالأسفل لبدء السهرة 📱</div>
            
            <div class="clash-container" id="clashContainer">
                <div class="explosion-effect" id="explosionEffect"></div>
                <div class="smoke-effect" id="smokeEffect"></div>
                
                <div class="fighter team1" id="displayPlayer1">الفريق الأول</div>
                <div class="vs-badge" id="vsBadge">VS</div>
                <div class="fighter team2" id="displayPlayer2">الفريق الثاني</div>
            </div>

            <div class="content-box" id="questionContentBox">
                <div class="question-text" id="questionText">نص السؤال يظهر هنا...</div>
                <div class="answer-text" id="answerText">💡 الإجابة: ...</div>
            </div>
        </div>

        <div class="scores-section">
            <div class="score-box team1-box">
                <span class="team-name" id="displayTeamName1">الفريق الأول</span>
                <span class="team-score" id="score1">0</span>
            </div>
            <div class="score-box team2-box">
                <span class="team-name" id="displayTeamName2">الفريق الثاني</span>
                <span class="team-score" id="score2">0</span>
            </div>
        </div>

        <div class="qr-section">
            <div id="qrcode"></div>
            <div class="status" id="statusText"><span>🟢</span> جاري الاتصال...</div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'clash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(25, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.85, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);

                const bufferSize = audioCtx.sampleRate * 0.45;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
                noiseSource.connect(noiseGain); noiseGain.connect(audioCtx.destination);
                noiseSource.start(); noiseSource.stop(audioCtx.currentTime + 0.45);

            } else if (type === 'new_q') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.12);
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.24);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        const roomId = "samra_main_room_2026";
        const baseUrl = "https://mar425361.github.io/samra-game";
        const mobileUrl = baseUrl + '/mobile.html?room=' + roomId;
        
        new QRCode(document.getElementById("qrcode"), { text: mobileUrl, width: 115, height: 115, colorDark: "#0f172a", colorLight: "#ffffff" });

        const socket = io("https://samra-server.onrender.com", { transports: ['websocket', 'polling'] });

        socket.on('connect', () => {
            document.getElementById('statusText').innerHTML = "<span>🟢</span> الشاشة متصلة بنجاح";
            socket.emit('join_room', roomId);
        });

        socket.on('disconnect', () => {
            document.getElementById('statusText').innerHTML = "<span>🔴</span> انقطع الاتصال";
        });

        socket.on('game_update', (data) => {
            if (data.action === 'NOMINATE') {
                document.getElementById('categoryTag').innerText = "🎯 فئة سين جيم: " + data.cat;
                document.getElementById('displayPlayer1').innerText = data.p1;
                document.getElementById('displayPlayer2').innerText = data.p2;
                
                document.getElementById('clashContainer').style.display = 'flex';
                document.getElementById('questionContentBox').style.display = 'none';

                document.getElementById('mainCard').classList.add('clash-active', 'screen-shake');
                playSound('clash');

                setTimeout(() => {
                    document.getElementById('mainCard').classList.remove('clash-active', 'screen-shake');
                }, 1200);

            } else if (data.action === 'SHOW_Q') {
                document.getElementById('clashContainer').style.display = 'none';
                document.getElementById('questionContentBox').style.display = 'flex';
                document.getElementById('questionText').innerText = data.q;
                document.getElementById('answerText').innerText = "💡 الإجابة: " + data.a;
                document.getElementById('answerText').style.display = 'none';
                playSound('new_q');

            } else if (data.action === 'SHOW_A') {
                document.getElementById('answerText').style.display = 'block';
                playSound('correct');

            } else if (data.action === 'SCORE') {
                document.getElementById('score1').innerText = data.s1;
                document.getElementById('score2').innerText = data.s2;

            } else if (data.action === 'UPDATE_NAMES') {
                document.getElementById('displayTeamName1').innerText = data.t1;
                document.getElementById('displayTeamName2').innerText = data.t2;
            }
        });
    </script>
</body>
</html>
