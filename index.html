<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي السمرة الكبرى - شاشة العرض</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .team {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .score {
            font-size: 2.5rem;
            color: #00ffcc;
        }

        .game-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 900px;
            margin: 0 auto;
            width: 80%;
        }

        .category-tag {
            background: #ff4757;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .question-text {
            font-size: 2.2rem;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .answer-text {
            font-size: 1.8rem;
            color: #2ed573;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        #alert-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(15, 12, 41, 0.95);
            border: 3px solid #ffd700;
            padding: 40px;
            border-radius: 25px;
            font-size: 3rem;
            color: #ffd700;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
            transition: transform 0.3s ease;
        }

        #alert-box.show {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

    <h1>🔥 تحدي السمرة الكبرى 🔥</h1>

    <div class="scoreboard">
        <div class="team">فريق 1<br><span id="score1" class="score">0</span></div>
        <div class="team">فريق 2<br><span id="score2" class="score">0</span></div>
    </div>

    <div class="game-box">
        <div id="category" class="category-tag">اختر فئة من الريموت</div>
        <div id="question" class="question-text">في انتظار السؤال...</div>
        <div id="answer" class="answer-text"></div>
    </div>

    <div id="alert-box">أبشر بي!</div>

    <script>
        setInterval(() => {
            document.getElementById('score1').innerText = localStorage.getItem('score1') || 0;
            document.getElementById('score2').innerText = localStorage.getItem('score2') || 0;
            
            let q = localStorage.getItem('current_question');
            let a = localStorage.getItem('current_answer');
            let c = localStorage.getItem('current_category');
            let showA = localStorage.getItem('show_answer');
            let alertMsg = localStorage.getItem('alert_msg');

            if(q) document.getElementById('question').innerText = q;
            if(c) document.getElementById('category').innerText = c;
            
            let ansDiv = document.getElementById('answer');
            if(showA === 'true') {
                ansDiv.innerText = "الإجابة: " + (a || "");
                ansDiv.style.display = "block";
            } else {
                ansDiv.style.display = "none";
            }

            let alertBox = document.getElementById('alert-box');
            if(alertMsg) {
                alertBox.innerText = alertMsg;
                alertBox.classList.add('show');
                setTimeout(() => {
                    alertBox.classList.remove('show');
                    localStorage.removeItem('alert_msg');
                }, 3000);
            }
        }, 500);
    </script>
</body>
</html>
