<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة السمرة - شاشة العرض</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #ffffff; min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 20px; overflow: hidden;
        }
        h1 { font-size: 3rem; color: #f59e0b; text-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }
        .main-container { display: flex; width: 95%; max-width: 1300px; gap: 20px; align-items: stretch; margin: auto; }
        
        .card {
            flex: 2; background: rgba(30, 41, 59, 0.85); border: 2px solid #3b82f6;
            border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            min-height: 400px;
        }
        .category-tag { font-size: 1.8rem; color: #38bdf8; font-weight: bold; margin-bottom: 15px; }
        .question-text { font-size: 2.5rem; line-height: 1.4; color: #f8fafc; margin-bottom: 25px; }
        .answer-text {
            font-size: 2rem; color: #10b981; background: rgba(16, 185, 129, 0.15);
            padding: 15px 30px; border-radius: 12px; border: 2px dashed #10b981; display: none;
        }

        .scores-section {
            flex: 1; background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .scores-title { font-size: 1.6rem; color: #f59e0b; margin-bottom: 15px; }
        .score-box {
            width: 100%; background: rgba(255,255,255,0.05); border-radius: 12px;
            padding: 15px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 1.5rem;
        }

        .qr-section {
            flex: 0.8; background: rgba(255, 255, 255, 0.05); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #qrcode { background: #fff; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .status { font-size: 1rem; color: #38bdf8; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <h1>🎲 لعبة السمرة - شاشة العرض</h1>

    <div class="main-container">
        <!-- السؤال والإجابة -->
        <div class="card">
            <div class="category-tag" id="categoryTag">امسح الـ QR لبدء اللعبة!</div>
            <div class="question-text" id="questionText">في انتظار التحكم من الجوال...</div>
            <div class="answer-text" id="answerText">الإجابة تظهر هنا</div>
        </div>

        <!-- النقاط -->
        <div class="scores-section">
            <div class="scores-title">🏆 لائحة النقاط</div>
            <div class="score-box"><span>الفريق 1:</span> <b id="score1" style="color:#f59e0b;">0</b></div>
            <div class="score-box"><span>الفريق 2:</span> <b id="score2" style="color:#f59e0b;">0</b></div>
        </div>

        <!-- الـ QR Code -->
        <div class="qr-section">
            <div id="qrcode"></div>
            <div class="status" id="statusText">جاري تجهيز الرابط... ⏳</div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'new_q') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // إنشاء اتصال PeerJS مباشر
        const peer = new Peer();

        peer.on('open', (id) => {
            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            const mobileUrl = baseUrl + '/mobile.html?peer=' + id;

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: mobileUrl, width: 140, height: 140 });
            document.getElementById('statusText').innerText = "جاهز للمسح من الجوال! 🟢";
            document.getElementById('statusText').style.color = "#10b981";
        });

        peer.on('connection', (conn) => {
            document.getElementById('statusText').innerText = "تم اتصال الجوال بنجاح! 📱✨";
            
            conn.on('data', (data) => {
                if (data.action === 'SET_Q') {
                    document.getElementById('categoryTag').innerText = data.cat;
                    document.getElementById('questionText').innerText = data.q;
                    document.getElementById('answerText').innerText = "💡 الإجابة: " + data.a;
                    document.getElementById('answerText').style.display = 'none';
                    playSound('new_q');
                } else if (data.action === 'SHOW_A') {
                    document.getElementById('answerText').style.display = 'block';
                    playSound('correct');
                } else if (data.action === 'SCORE') {
                    document.getElementById('score1').innerText = data.s1;
                    document.getElementById('score2').innerText = data.s2;
                }
            });
        });
    </script>
</body>
</html>
