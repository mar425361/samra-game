<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة العرض - سهرة العائلة</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; background: #0b0b0b; color: #fff; margin: 0; padding: 20px; direction: rtl; text-align: center; }
        h1 { color: #f39c12; margin-bottom: 20px; }
        .score-board { display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 22px; }
        .team-score { color: #2ecc71; font-weight: bold; }
        
        .stage { background: #151515; border: 2px dashed #444; border-radius: 15px; padding: 30px; min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* تصميم عجلة الحظ الكلاسيكية */
        .wheel-container { position: relative; width: 220px; height: 220px; margin: 15px auto; display: none; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #f39c12; background: conic-gradient(#e74c3c 0deg 90deg, #3498db 90deg 180deg, #2ecc71 180deg 270deg, #9b59b6 270deg 360deg); box-shadow: 0 0 15px rgba(243,156,18,0.6); }
        .wheel-pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 20px solid #f1c40f; z-index: 10; }

        .category-display { font-size: 26px; color: #f1c40f; font-weight: bold; margin-bottom: 10px; }
        .nomination-display { font-size: 24px; color: #3498db; margin-bottom: 10px; font-weight: bold; }
        .question-box { font-size: 28px; margin-bottom: 20px; line-height: 1.4; }
        .answer-box { font-size: 26px; color: #2ecc71; font-weight: bold; background: #1e1e1e; padding: 10px; border-radius: 8px; display: none; }
        .members-list { font-size: 13px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>سهرة العائلة - التحدي الكبير</h1>

    <div class="score-board">
        <div>
            <div id="t1Display">فريق 1</div>
            <div class="team-score" id="s1Display">0</div>
            <div class="members-list" id="t1MembersList">الأعضاء: -</div>
        </div>
        <div>VS</div>
        <div>
            <div id="t2Display">فريق 2</div>
            <div class="team-score" id="s2Display">0</div>
            <div class="members-list" id="t2MembersList">الأعضاء: -</div>
        </div>
    </div>

    <div class="stage" id="mainStage">
        <!-- عجلة الحظ المضافة -->
        <div class="wheel-container" id="wheelContainer">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="spinningWheel"></div>
        </div>

        <div id="dynamicContent">
            <h2>في انتظار بدء الجولة...</h2>
        </div>
    </div>

    <script>
        const socket = io("https://samra-server.onrender.com");
        const roomName = "samra_room_1";

        socket.on('connect', () => {
            socket.emit('join_room', roomName);
        });

        socket.on('game_action_receiver', (data) => {
            const wheelContainer = document.getElementById('wheelContainer');
            const content = document.getElementById('dynamicContent');

            if (data.action === 'SPIN_WHEEL') {
                wheelContainer.style.display = 'block';
                content.innerHTML = `<div class="category-display">🎡 عجلة الحظ تدور لاختيار الفئة...</div>`;
                
                const wheel = document.getElementById('spinningWheel');
                wheel.style.transition = 'none';
                wheel.style.transform = 'rotate(0deg)';
                
                setTimeout(() => {
                    wheel.style.transition = 'transform 3s cubic-bezier(0.15, 0.9, 0.2, 1)';
                    const randomDegree = Math.floor(1440 + Math.random() * 1080);
                    wheel.style.transform = `rotate(${randomDegree}deg)`;
                }, 50);
            } 
            else if (data.action === 'SHOW_CATEGORY') {
                wheelContainer.style.display = 'none';
                content.innerHTML = `<div class="category-display">🎯 الفئة المختارة: ${data.cat}</div>`;
            } 
            else if (data.action === 'NOMINATE') {
                wheelContainer.style.display = 'none';
                content.innerHTML = `
                    <div class="category-display">🎯 الفئة: ${data.cat}</div>
                    <div class="nomination-display">⚔️ المواجهة بين: ${data.p1} ضد ${data.p2}</div>
                `;
            } 
            else if (data.action === 'SHOW_Q') {
                wheelContainer.style.display = 'none';
                content.innerHTML = `
                    <div class="question-box">❓ ${data.q}</div>
                    <div class="answer-box" id="ansBox">${data.a}</div>
                `;
            } 
            else if (data.action === 'SHOW_A') {
                const ans = document.getElementById('ansBox');
                if (ans) ans.style.display = 'block';
            } 
            else if (data.action === 'SCORE') {
                document.getElementById('s1Display').innerText = data.s1;
                document.getElementById('s2Display').innerText = data.s2;
            } 
            else if (data.action === 'UPDATE_TEAMS') {
                document.getElementById('t1Display').innerText = data.t1;
                document.getElementById('t2Display').innerText = data.t2;
                document.getElementById('t1MembersList').innerText = "الأعضاء: " + (data.m1.join(', ') || 'لا يوجد');
                document.getElementById('t2MembersList').innerText = "الأعضاء: " + (data.m2.join(', ') || 'لا يوجد');
            }
        });
    </script>
</body>
</html>
