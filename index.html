<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة السمرة - شاشة العرض</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 30px; text-align: center; overflow: hidden;
        }
        h1 { font-size: 3.5rem; color: #f59e0b; text-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        .main-container { display: flex; width: 95%; max-width: 1200px; gap: 40px; align-items: center; margin: auto; }
        .card {
            flex: 2; background: rgba(30, 41, 59, 0.9); border: 2px solid #3b82f6;
            border-radius: 24px; padding: 50px; min-height: 400px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }
        .category-tag { font-size: 2rem; color: #38bdf8; margin-bottom: 20px; font-weight: bold; }
        .question-text { font-size: 2.8rem; line-height: 1.4; color: #f8fafc; margin-bottom: 30px; }
        .answer-text {
            font-size: 2.2rem; color: #10b981; background: rgba(16, 185, 129, 0.15);
            padding: 20px 40px; border-radius: 15px; border: 2px dashed #10b981; display: none;
        }
        .qr-section {
            flex: 1; background: rgba(255, 255, 255, 0.05); border-radius: 24px;
            padding: 25px; display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #qrcode { background: #fff; padding: 15px; border-radius: 16px; margin-bottom: 15px; }
        .qr-text { font-size: 1.4rem; color: #cbd5e1; }
    </style>
</head>
<body>

    <h1>🎲 لعبة السمرة</h1>

    <div class="main-container">
        <div class="card">
            <div class="category-tag" id="categoryTag">امسح الـ QR للبدء!</div>
            <div class="question-text" id="questionText">في انتظار سحب سؤال من الجوال...</div>
            <div class="answer-text" id="answerText">الإجابة تظهر هنا</div>
        </div>

        <div class="qr-section">
            <div id="qrcode"></div>
            <div class="qr-text">امسح الكود بجوالك<br>للوصول لريموت التحكم 📱</div>
        </div>
    </div>

    <script>
        // رابط الجوال المباشر لصفحة التحكم mobile.html
        const mobileUrl = window.location.href.replace('index.html', '').replace(/\/$/, '') + '/mobile.html';
        
        new QRCode(document.getElementById("qrcode"), {
            text: mobileUrl,
            width: 200,
            height: 200
        });

        // أصوات تفاعلية
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (type === 'new_q') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'show_ans') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // جلب الأسئلة
        let questionsData = {};
        fetch('questions.json').then(r => r.json()).then(d => questionsData = d);

        // استقبال الأوامر من الجوال
        const channel = new BroadcastChannel('samra_game_channel');
        channel.onmessage = (event) => {
            if (event.data.action === 'NEXT_QUESTION') {
                const cats = Object.keys(questionsData);
                if (!cats.length) return;
                const randomCat = cats[Math.floor(Math.random() * cats.length)];
                const qList = questionsData[randomCat];
                const randomQ = qList[Math.floor(Math.random() * qList.length)];

                document.getElementById('categoryTag').innerText = randomCat;
                document.getElementById('questionText').innerText = randomQ.q;
                document.getElementById('answerText').innerText = "💡 الإجابة: " + randomQ.a;
                document.getElementById('answerText').style.display = 'none';
                playSound('new_q');
            } else if (event.data.action === 'SHOW_ANSWER') {
                const ans = document.getElementById('answerText');
                if (ans.style.display === 'none' || !ans.style.display) {
                    ans.style.display = 'block';
                    playSound('show_ans');
                }
            }
        };
    </script>
</body>
</html>
