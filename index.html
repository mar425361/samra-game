<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سهرة العائلة والأصدقاء - تحدي الخبراء</title>
    <!-- مكتبة توليد الباركود -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- مكتبة السوكت آي أو المتصلة بسيرفر Render الخاص بك -->
    <script src="https://samra-server.onrender.com/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; padding: 20px; overflow: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 { font-size: 2rem; color: #f59e0b; text-shadow: 0 0 20px rgba(245, 158, 11, 0.4); font-weight: 900; }
        .main-container { display: flex; flex-direction: row-reverse; width: 100%; max-width: 1400px; height: 82vh; gap: 20px; align-items: stretch; }
        .card {
            flex: 3; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px);
            border: 2px solid rgba(59, 130, 246, 0.4); border-radius: 20px; padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, #3b82f6, #f59e0b, #10b981);
        }
        .category-tag { font-size: 1.5rem; color: #38bdf8; font-weight: 700; margin-bottom: 30px; background: rgba(56, 189, 248, 0.1); padding: 8px 30px; border-radius: 50px; border: 1px solid rgba(56,189,248,0.3); }
        .clash-container { display: flex; align-items: center; justify-content: center; gap: 25px; width: 100%; margin: 20px 0; }
        .fighter {
            font-size: 2rem; font-weight: 900; padding: 30px 40px; border-radius: 16px; background: rgba(15, 23, 42, 0.95);
            border: 3px solid #3b82f6; box-shadow: 0 0 25px rgba(59,130,246,0.5); width: 42%; word-break: break-word;
        }
        .fighter.team2 { border-color: #f59e0b; box-shadow: 0 0 25px rgba(245,158,11,0.5); }
        .vs-badge { font-size: 3rem; font-weight: 900; color: #ef4444; text-shadow: 0 0 30px rgba(239,68,68,0.8); }
        .content-box { display: none; width: 100%; flex-direction: column; gap: 20px; align-items: center; }
        .question-text { font-size: 2.2rem; line-height: 1.4; color: #f8fafc; font-weight: 700; }
        .answer-text {
            font-size: 1.8rem; color: #34d399; background: rgba(16, 185, 129, 0.15);
            padding: 15px 30px; border-radius: 14px; border: 2px dashed #10b981; display: none;
            box-shadow: 0 0 20px rgba(16,185,129,0.2);
        }
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 15px; max-width: 340px; }
        .score-box {
            background: rgba(30, 41, 59, 0.85); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; padding: 18px; display: flex; flex-direction: column; gap: 8px;
        }
        .team1-box { border-right: 5px solid #3b82f6; }
        .team2-box { border-right: 5px solid #f59e0b; }
        .team-header { display: flex; justify-content: space-between; align-items: center; }
        .team-name { font-size: 1.2rem; color: #94a3b8; font-weight: 700; }
        .team-score { font-size: 2rem; font-weight: 900; color: #fff; }
        .members-list { font-size: 0.9rem; color: #cbd5e1; background: rgba(15,23,42,0.5); padding: 10px; border-radius: 8px; min-height: 40px; line-height: 1.6; }
        .qr-section { background: rgba(30, 41, 59, 0.85); border-radius: 18px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #qrcode { background: #fff; padding: 8px; border-radius: 12px; margin-bottom: 8px; }
        .status { font-size: 0.9rem; color: #34d399; font-weight: 700; }
    </style>
</head>
<body>

    <h1>🌙 سهرة العائلة والأصدقاء - تحدي الخبراء</h1>

    <div class="main-container">
        <div class="card">
            <div class="category-tag" id="categoryTag">امسح كود الجوال للبدء 📱</div>
            
            <div class="clash-container" id="clashContainer">
                <div class="fighter team1" id="displayPlayer1">الفريق الأول</div>
                <div class="vs-badge">VS</div>
                <div class="fighter team2" id="displayPlayer2">الفريق الثاني</div>
            </div>

            <div class="content-box" id="questionContentBox">
                <div class="question-text" id="questionText">السؤال يظهر هنا...</div>
                <div class="answer-text" id="answerText">💡 الإجابة: ...</div>
            </div>
        </div>

        <div class="sidebar">
            <div class="score-box team1-box">
                <div class="team-header">
                    <span class="team-name" id="displayTeamName1">الفريق الأول</span>
                    <span class="team-score" id="score1">0</span>
                </div>
                <div class="members-list" id="displayMembers1">الأعضاء: لم يتم الإضافة</div>
            </div>

            <div class="score-box team2-box">
                <div class="team-header">
                    <span class="team-name" id="displayTeamName2">الفريق الثاني</span>
                    <span class="team-score" id="score2">0</span>
                </div>
                <div class="members-list" id="displayMembers2">الأعضاء: لم يتم الإضافة</div>
            </div>

            <div class="qr-section">
                <div id="qrcode"></div>
                <div class="status"><span>🟢</span> متصل بالسحابية</div>
            </div>
        </div>
    </div>

    <script>
        // الاتصال بسيرفر Render الموحد
        const socket = io("https://samra-server.onrender.com");
        const roomName = "samra_room_1"; // اسم الغرفة الموحدة

        socket.on('connect', () => {
            socket.emit('join_room', roomName);
        });

        // توليد رابط الجوال الصحيح بناءً على مسار الملف الحالي في غيت هب
        let currentUrl = window.location.href.split('?')[0].split('#')[0];
        if (currentUrl.endsWith('index.html')) {
            currentUrl = currentUrl.replace('index.html', '');
        }
        if (!currentUrl.endsWith('/')) {
            currentUrl += '/';
        }
        const mobileUrl = currentUrl + "mobile.html";

        new QRCode(document.getElementById("qrcode"), { 
            text: mobileUrl, 
            width: 90, 
            height: 90, 
            colorDark: "#0f172a", 
            colorLight: "#ffffff" 
        });

        // استقبال التحديثات من السيرفر وعرضها على الشاشة
        socket.on('game_update', (data) => {
            if (data.action === 'NOMINATE') {
                document.getElementById('categoryTag').innerText = "🎯 الفئة: " + data.cat;
                document.getElementById('displayPlayer1').innerText = data.p1;
                document.getElementById('displayPlayer2').innerText = data.p2;
                document.getElementById('clashContainer').style.display = 'flex';
                document.getElementById('questionContentBox').style.display = 'none';
            } else if (data.action === 'SHOW_Q') {
                document.getElementById('clashContainer').style.display = 'none';
                document.getElementById('questionContentBox').style.display = 'flex';
                document.getElementById('questionText').innerText = data.q;
                document.getElementById('answerText').innerText = "💡 الإجابة: " + data.a;
                document.getElementById('answerText').style.display = 'none';
            } else if (data.action === 'SHOW_A') {
                document.getElementById('answerText').style.display = 'block';
            } else if (data.action === 'UPDATE_TEAMS') {
                document.getElementById('displayTeamName1').innerText = data.t1;
                document.getElementById('displayTeamName2').innerText = data.t2;
                document.getElementById('displayMembers1').innerHTML = "الأعضاء: " + (data.m1 && data.m1.length > 0 ? data.m1.join('، ') : "لا يوجد");
                document.getElementById('displayMembers2').innerHTML = "الأعضاء: " + (data.m2 && data.m2.length > 0 ? data.m2.join('، ') : "لا يوجد");
            } else if (data.action === 'SCORE') {
                document.getElementById('score1').innerText = data.s1;
                document.getElementById('score2').innerText = data.s2;
            }
        });
    </script>
</body>
</html>
