<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة السمرة 🎲</title>
    <!-- مكتبة الـ QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header h1 {
            color: #f43f5e;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }
        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
        }
        .game-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 25px;
            flex: 2;
            min-width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .qr-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            flex: 1;
            min-width: 250px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .question-box {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 25px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .buttons-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            min-width: 130px;
        }
        .btn-primary { background: #f43f5e; color: white; }
        .btn-primary:hover { background: #e11d48; }
        .btn-secondary { background: #3b82f6; color: white; }
        .btn-secondary:hover { background: #2563eb; }
        .answer-box {
            margin-top: 15px;
            padding: 15px;
            background: #064e3b;
            color: #6ee7b7;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
        }
        #qrcode {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎲 لعبة السمرة</h1>
    </div>

    <div class="main-container">
        <div class="game-card">
            <div class="controls">
                <label style="color:#cbd5e1; font-weight:bold;">اختر التصنيف:</label>
                <select id="categorySelect" onchange="filterQuestions()">
                    <option value="الكل">جميع التصنيفات 🌟</option>
                </select>
            </div>

            <div class="question-box" id="questionText">جاري تحميل الأسئلة... ⏳</div>

            <div class="buttons-group">
                <button class="btn btn-primary" onclick="nextQuestion()">سؤال جديد 🔄</button>
                <button class="btn btn-secondary" onclick="toggleAnswer()">إظهار/إخفاء الإجابة 👁️</button>
            </div>

            <div class="answer-box" id="answerText"></div>
        </div>

        <div class="qr-card">
            <h3 style="margin-top: 0; color: #f43f5e;">امسح بالكاميرا للعب 📱</h3>
            <div id="qrcode"></div>
            <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 15px;">شارك اللعبة مع الشباب!</p>
        </div>
    </div>

    <script>
        let allData = {};
        let currentQuestions = [];
        let currentQuestion = null;

        // جلب الأسئلة من ملف questions.json الخارجي
        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                allData = await response.json();
                
                initCategories();
                document.getElementById('questionText').innerText = 'اضغط على "سؤال جديد" للبدء! 🚀';
            } catch (error) {
                document.getElementById('questionText').innerText = 'حدث خطأ في تحميل الأسئلة!';
                console.error(error);
            }
        }

        function initCategories() {
            const select = document.getElementById('categorySelect');
            select.innerHTML = '<option value="الكل">جميع التصنيفات 🌟</option>';
            for (let cat in allData) {
                let opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat + ` (${allData[cat].length})`;
                select.appendChild(opt);
            }
            filterQuestions();
        }

        function filterQuestions() {
            const selectedCat = document.getElementById('categorySelect').value;
            currentQuestions = [];

            if (selectedCat === "الكل") {
                for (let cat in allData) {
                    currentQuestions = currentQuestions.concat(allData[cat]);
                }
            } else {
                currentQuestions = allData[selectedCat] || [];
            }
        }

        function nextQuestion() {
            if (currentQuestions.length === 0) return;
            const randomIndex = Math.floor(Math.random() * currentQuestions.length);
            currentQuestion = currentQuestions[randomIndex];

            document.getElementById('questionText').innerText = currentQuestion.q;
            document.getElementById('answerText').innerText = "الجواب: " + currentQuestion.a;
            document.getElementById('answerText').style.display = 'none';
        }

        function toggleAnswer() {
            const ansBox = document.getElementById('answerText');
            if (!currentQuestion) return;
            ansBox.style.display = (ansBox.style.display === 'none' || ansBox.style.display === '') ? 'block' : 'none';
        }

        window.onload = function() {
            loadQuestions();
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 140,
                height: 140
            });
        };
    </script>
</body>
</html>
