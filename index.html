<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحدي السمرة الكبرى - شاشة العرض الاستوديو</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1b1b3a 0%, #0f0c29 100%);
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header h1 {
            font-size: 2.8rem;
            margin: 5px 0;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            letter-spacing: 1px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .team-box {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .score {
            font-size: 3rem;
            color: #00ffcc;
            display: block;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        .game-box {
            background: rgba(15, 12, 41, 0.75);
            border-radius: 25px;
            padding: 40px;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            max-width: 1000px;
            margin: 0 auto;
            width: 85%;
            position: relative;
        }

        .category-tag {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.4rem;
            display: inline-block;
            margin-bottom: 25px;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .question-text {
            font-size: 2.5rem;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 700;
        }

        .answer-text {
            font-size: 2rem;
            color: #2ed573;
            margin-top: 20px;
            display: none;
            font-weight: bold;
            background: rgba(46, 213, 115, 0.1);
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #2ed573;
        }

        /* نافذة التنبيهات والأزرار النارية */
        #alert-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(15, 12, 41, 0.95);
            border: 4px solid #ffd700;
            padding: 50px 70px;
            border-radius: 30px;
            font-size: 3.5rem;
            color: #ffd700;
            z-index: 1000;
            box-shadow: 0 0 70px rgba(255, 215, 0, 0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        #alert-box.show {
            transform: translate(-50%, -50%) scale(1);
        }

        footer {
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🔥 تحدي السمرة الكبرى 🔥</h1>
    </header>

    <div class="scoreboard">
        <div class="team-box">فريق 1<span id="score1" class="score">0</span></div>
        <div class="team-box">فريق 2<span id="score2" class="score">0</span></div>
    </div>

    <div class="game-box">
        <div id="category" class="category-tag">اختر فئة من الريموت لتبدأ الجلسة</div>
        <div id="question" class="question-text">أهلاً بالشباب، جاهزين للحماس؟</div>
        <div id="answer" class="answer-text"></div>
    </div>

    <div id="alert-box">أبشر بي!</div>

    <footer>نظام مسابقات السمرة التفاعلي - النسخة الكاملة</footer>

    <script>
        setInterval(() => {
            document.getElementById('score1').innerText = localStorage.getItem('score1') || 0;
            document.getElementById('score2').innerText = localStorage.getItem('score2') || 0;
            
            let q = localStorage.getItem('current_question');
            let a = localStorage.getItem('current_answer');
            let c = localStorage.getItem('current_category');
            let showA = localStorage.getItem('show_answer');
            let alertMsg = localStorage.getItem('alert_msg');

            if(q) document.getElementById('question').innerText = q;
            if(c) document.getElementById('category').innerText = c;
            
            let ansDiv = document.getElementById('answer');
            if(showA === 'true') {
                ansDiv.innerText = "الإجابة الصحيحة: " + (a || "");
                ansDiv.style.display = "block";
            } else {
                ansDiv.style.display = "none";
            }

            let alertBox = document.getElementById('alert-box');
            if(alertMsg) {
                alertBox.innerText = alertMsg;
                alertBox.classList.add('show');
                setTimeout(() => {
                    alertBox.classList.remove('show');
                    localStorage.removeItem('alert_msg');
                }, 3500);
            }
        }, 400);
    </script>
</body>
</html>
