<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - سهرة العائلة</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; background: #121212; color: #fff; margin: 0; padding: 15px; direction: rtl; }
        h2 { text-align: center; color: #f39c12; }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; background: #1e1e1e; padding: 10px; border-radius: 10px; }
        .tab-btn { background: none; border: none; color: #aaa; font-size: 16px; cursor: pointer; padding: 10px; font-weight: bold; }
        .tab-btn.active { color: #f39c12; border-bottom: 2px solid #f39c12; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #ddd; }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; }
        button.btn-main { width: 100%; padding: 12px; background: #f39c12; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button.btn-main:active { background: #d35400; }
        .member-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-small { padding: 5px 10px; background: #e74c3c; border: none; color: white; border-radius: 5px; cursor: pointer; }
        
        .players-picker-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .picker-box { flex: 1; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .picker-box h4 { margin: 0 0 8px 0; font-size: 14px; color: #f39c12; text-align: center; }
        .player-chips { display: flex; flex-wrap: wrap; gap: 5px; max-height: 120px; overflow-y: auto; }
        .chip { background: #333; border: 1px solid #555; color: #fff; padding: 6px 10px; border-radius: 15px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .chip:hover { background: #f39c12; color: #000; }
        .chip.selected { background: #27ae60; border-color: #2ecc71; font-weight: bold; }

        .score-control { display: flex; align-items: center; gap: 8px; }
        .score-control input { text-align: center; font-size: 18px; font-weight: bold; }
        .btn-score { padding: 10px 15px; background: #333; border: 1px solid #555; color: #fff; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .btn-score:active { background: #555; }
        .next-q-box { background: #1e1e1e; padding: 10px; border-radius: 5px; border: 1px dashed #f39c12; margin-bottom: 15px; font-size: 14px; color: #f1c40f; text-align: center; }
    </style>
</head>
<body>

    <h2>لوحة تحكم المايسترو</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(0)">الفرق والأعضاء</button>
        <button class="tab-btn tab-btn-main" onclick="switchTab(1)">إدارة المواجهة</button>
    </div>

    <!-- التاب الأول: الفرق والأعضاء -->
    <div class="panel active">
        <div class="form-group">
            <label>اسم الفريق الأول:</label>
            <input type="text" id="team1Name" value="فريق الصقور">
        </div>
        <div class="form-group">
            <label>أعضاء الفريق الأول:</label>
            <div id="t1MembersContainer">
                <div class="member-row"><input type="text" class="t1-member" placeholder="اسم العضو"></div>
            </div>
            <button class="btn-small" style="background:#27ae60;" onclick="addMemberField('t1MembersContainer', 't1-member')">+ إضافة عضو</button>
        </div>

        <hr style="border-color: #333; margin: 20px 0;">

        <div class="form-group">
            <label>اسم الفريق الثاني:</label>
            <input type="text" id="team2Name" value="فريق النمور">
        </div>
        <div class="form-group">
            <label>أعضاء الفريق الثاني:</label>
            <div id="t2MembersContainer">
                <div class="member-row"><input type="text" class="t2-member" placeholder="اسم العضو"></div>
            </div>
            <button class="btn-small" style="background:#27ae60;" onclick="addMemberField('t2MembersContainer', 't2-member')">+ إضافة عضو</button>
        </div>

        <button class="btn-main" onclick="saveTeamsAndSync()">حفظ وتحديث أسماء الفرق والأعضاء</button>
    </div>

    <!-- التاب الثاني: المواجهة والأسئلة -->
    <div class="panel">
        <div class="form-group">
            <label>الفئة الحالية (تم اختيارها عشوائياً):</label>
            <select id="categorySelect"></select>
        </div>

        <!-- زر سحب فئة وسؤال عشوائي بالكامل -->
        <div class="next-q-box" id="previewBox">جاري التحميل...</div>
        <button class="btn-main" style="background: #16a085; margin-top: 0;" onclick="loadRandomCategoryAndQuestion()">🎲 سحب فئة وسؤال عشوائي جديد</button>

        <hr style="border-color: #333; margin: 15px 0;">

        <!-- اختيار اللاعبين بالضغط -->
        <label>اختر المتباريين بناءً على الفئة الظاهرة بالشاشة:</label>
        <div class="players-picker-container">
            <div class="picker-box">
                <h4 id="t1LabelDisplay">الفريق الأول</h4>
                <div class="player-chips" id="t1ChipsContainer">
                    <span style="color:#777; font-size:12px;">أدخل الأعضاء في التاب الأول أولاً</span>
                </div>
            </div>
            <div class="picker-box">
                <h4 id="t2LabelDisplay">الفريق الثاني</h4>
                <div class="player-chips" id="t2ChipsContainer">
                    <span style="color:#777; font-size:12px;">أدخل الأعضاء في التاب الأول أولاً</span>
                </div>
            </div>
        </div>

        <div class="form-group" style="display:none;">
            <input type="text" id="player1Input">
            <input type="text" id="player2Input">
        </div>

        <button class="btn-main" style="background:#3498db;" onclick="sendNomination()">بدء المواجهة (عرض اللاعبين)</button>
        
        <hr style="border-color: #333; margin: 20px 0;">

        <button class="btn-main" style="background:#9b59b6;" onclick="showQuestion()">إظهار السؤال على الشاشة</button>
        <button class="btn-main" style="background:#e67e22;" onclick="showAnswer()">إظهار الإجابة الصحيحة</button>

        <hr style="border-color: #333; margin: 20px 0;">

        <!-- تحكم النقاط -->
        <div class="form-group">
            <label>نقاط الفريق الأول:</label>
            <div class="score-control">
                <button class="btn-score" onclick="changeScore('score1Input', -1)">-</button>
                <input type="number" id="score1Input" value="0">
                <button class="btn-score" onclick="changeScore('score1Input', 1)">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>نقاط الفريق الثاني:</label>
            <div class="score-control">
                <button class="btn-score" onclick="changeScore('score2Input', -1)">-</button>
                <input type="number" id="score2Input" value="0">
                <button class="btn-score" onclick="changeScore('score2Input', 1)">+</button>
            </div>
        </div>
        <button class="btn-main" style="background:#27ae60;" onclick="updateScores()">تحديث وإرسال النقاط للشاشة</button>
    </div>

    <script>
        const socket = io("https://samra-server.onrender.com");
        const roomName = "samra_room_1";

        socket.on('connect', () => {
            socket.emit('join_room', roomName);
        });

        let questionBank = {};
        let currentCat = "", currentQ = "", currentA = "";
        let selectedPlayer1 = "";
        let selectedPlayer2 = "";

        fetch('questions.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                questionBank = data;
                populateCategories();
                loadRandomCategoryAndQuestion();
            })
            .catch(error => console.error('خطأ في تحميل الأسئلة:', error));

        function populateCategories() {
            const select = document.getElementById('categorySelect');
            select.innerHTML = '';
            for (const category in questionBank) {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                select.appendChild(option);
            }
        }

        function switchTab(index) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel')[index].classList.add('active');
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
            
            if(index === 1) {
                updatePlayerChips();
            }
        }

        function addMemberField(containerId, className) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'member-row';
            div.innerHTML = `<input type="text" class="${className}" placeholder="اسم العضو"><button class="btn-small" onclick="removeRow(this)">-</button>`;
            container.appendChild(div);
        }

        function removeRow(btn) { btn.parentElement.remove(); }

        function updatePlayerChips() {
            const t1Name = document.getElementById('team1Name').value || "الفريق الأول";
            const t2Name = document.getElementById('team2Name').value || "الفريق الثاني";
            
            document.getElementById('t1LabelDisplay').innerText = t1Name;
            document.getElementById('t2LabelDisplay').innerText = t2Name;

            const t1Members = Array.from(document.querySelectorAll('.t1-member')).map(i => i.value).filter(v => v.trim() !== "");
            const t2Members = Array.from(document.querySelectorAll('.t2-member')).map(i => i.value).filter(v => v.trim() !== "");

            const t1Container = document.getElementById('t1ChipsContainer');
            const t2Container = document.getElementById('t2ChipsContainer');

            t1Container.innerHTML = "";
            t2Container.innerHTML = "";

            if(t1Members.length === 0) {
                t1Container.innerHTML = '<span style="color:#777; font-size:12px;">لم تدخل أعضاء</span>';
            } else {
                t1Members.forEach(name => {
                    const chip = document.createElement('div');
                    chip.className = 'chip' + (selectedPlayer1 === name ? ' selected' : '');
                    chip.innerText = name;
                    chip.onclick = () => {
                        selectedPlayer1 = name;
                        document.getElementById('player1Input').value = name;
                        updatePlayerChips();
                    };
                    t1Container.appendChild(chip);
                });
            }

            if(t2Members.length === 0) {
                t2Container.innerHTML = '<span style="color:#777; font-size:12px;">لم تدخل أعضاء</span>';
            } else {
                t2Members.forEach(name => {
                    const chip = document.createElement('div');
                    chip.className = 'chip' + (selectedPlayer2 === name ? ' selected' : '');
                    chip.innerText = name;
                    chip.onclick = () => {
                        selectedPlayer2 = name;
                        document.getElementById('player2Input').value = name;
                        updatePlayerChips();
                    };
                    t2Container.appendChild(chip);
                });
            }
        }

        // دالة تختار فئة عشوائية ومن ثم تسحب منها سؤال عشوائي وتعلنه للشاشة
        function loadRandomCategoryAndQuestion() {
            const categories = Object.keys(questionBank);
            if(categories.length === 0) return;
            
            // اختيار فئة عشوائية من الـ 20 فئة
            const randomCat = categories[Math.floor(Math.random() * categories.length)];
            document.getElementById('categorySelect').value = randomCat;
            currentCat = randomCat;

            // سحب سؤال عشوائي من هذي الفئة
            const list = questionBank[randomCat];
            const rand = list[Math.floor(Math.random() * list.length)];
            currentQ = rand.q;
            currentA = rand.a;
            
            document.getElementById('previewBox').innerHTML = `<b>الفئة المختارة عشوائياً:</b> <span style="color:#fff">${currentCat}</span><br><b>السؤال:</b> ${currentQ}<br><span style="color:#2ecc71"><b>الجواب:</b> ${currentA}</span>`;

            // إرسال الفئة فوراً للشاشة الكبيرة عشان الفرق يعرفونها ويرشحون لاعبينهم
            socket.emit('game_action', {
                room: roomName, action: 'SHOW_CATEGORY',
                cat: currentCat
            });
        }

        function changeScore(inputId, amount) {
            const input = document.getElementById(inputId);
            let val = parseInt(input.value) || 0;
            val += amount;
            if(val < 0) val = 0;
            input.value = val;
        }

        function saveTeamsAndSync() {
            updateTeamData();
            switchTab(1);
        }

        function updateTeamData() {
            const t1Members = Array.from(document.querySelectorAll('.t1-member')).map(i => i.value).filter(v => v.trim() !== "");
            const t2Members = Array.from(document.querySelectorAll('.t2-member')).map(i => i.value).filter(v => v.trim() !== "");

            socket.emit('game_action', {
                room: roomName, action: 'UPDATE_TEAMS',
                t1: document.getElementById('team1Name').value,
                t2: document.getElementById('team2Name').value,
                m1: t1Members, m2: t2Members
            });
            alert("تم حفظ وتحديث الفرق والأعضاء بنجاح!");
        }

        function sendNomination() {
            const p1 = document.getElementById('player1Input').value;
            const p2 = document.getElementById('player2Input').value;

            if(!p1 || !p2) {
                alert("الرجاء اختيار لاعب من الفريق الأول ولاعب من الفريق الثاني أولاً!");
                return;
            }

            socket.emit('game_action', {
                room: roomName, action: 'NOMINATE',
                cat: currentCat,
                p1: p1,
                p2: p2
            });
        }

        function showQuestion() {
            socket.emit('game_action', { room: roomName, action: 'SHOW_Q', q: currentQ, a: currentA });
        }

        function showAnswer() {
            socket.emit('game_action', { room: roomName, action: 'SHOW_A' });
        }

        function updateScores() {
            socket.emit('game_action', {
                room: roomName, action: 'SCORE',
                s1: document.getElementById('score1Input').value, s2: document.getElementById('score2Input').value
            });
            alert("تم تحديث النقاط!");
        }
    </script>
</body>
</html>
