<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم السمرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: #0f172a; color: #fff; padding: 15px; display: flex; flex-direction: column; gap: 15px; align-items: center; min-height: 100vh; }
        h2 { color: #f59e0b; font-size: 1.3rem; text-align: center; }
        
        .tabs { display: flex; width: 100%; max-width: 400px; gap: 5px; background: #1e293b; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px 5px; border: none; background: transparent; color: #94a3b8; font-weight: 700; font-size: 0.85rem; border-radius: 8px; cursor: pointer; text-align: center; }
        .tab-btn.active { background: #3b82f6; color: #fff; }

        .panel { display: none; background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 15px; width: 100%; max-width: 400px; flex-direction: column; gap: 12px; }
        .panel.active { display: flex; }

        label { font-size: 0.85rem; color: #94a3b8; font-weight: 700; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: #1e293b; color: #fff; font-size: 0.95rem; }
        
        .member-row { display: flex; gap: 8px; margin-bottom: 5px; }
        .btn-small { width: 45px; padding: 8px; font-weight: 900; border-radius: 8px; border: none; cursor: pointer; }
        .btn-add { background: #10b981; color: #fff; }
        .btn-remove { background: #ef4444; color: #fff; }

        button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-warning { background: #f59e0b; color: #0f172a; }
        .status { font-size: 0.75rem; text-align: center; padding: 6px; border-radius: 6px; background: rgba(15,23,42,0.6); color: #34d399; font-weight: 700; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <h2>🎮 تحكم السمرة</h2>
    <div class="status" id="mobileStatus">🟢 متصل باللعبة فورياً</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(0)">الفرق والأعضاء</button>
        <button class="tab-btn" onclick="switchTab(1)">الأسئلة</button>
        <button class="tab-btn" onclick="switchTab(2)">النقاط</button>
    </div>

    <!-- تبويب 1: الفرق والأعضاء مع خيار الزيادة والنقصان -->
    <div class="panel active" id="tab0">
        <label>اسم الفريق الأول:</label>
        <input type="text" id="team1Name" value="الفريق الأول">
        <label>أعضاء الفريق الأول:</label>
        <div id="team1MembersContainer">
            <div class="member-row">
                <input type="text" class="t1-member" value="خالد">
                <button class="btn-small btn-remove" onclick="removeRow(this)">-</button>
            </div>
        </div>
        <button class="btn-small btn-add" style="width:100%; margin-top:5px;" onclick="addMemberField('team1MembersContainer', 't1-member')">+ إضافة عضو للفريق 1</button>

        <hr style="border-color: rgba(255,255,255,0.1); margin: 10px 0;">

        <label>اسم الفريق الثاني:</label>
        <input type="text" id="team2Name" value="الفريق الثاني">
        <label>أعضاء الفريق الثاني:</label>
        <div id="team2MembersContainer">
            <div class="member-row">
                <input type="text" class="t2-member" value="صقر">
                <button class="btn-small btn-remove" onclick="removeRow(this)">-</button>
            </div>
        </div>
        <button class="btn-small btn-add" style="width:100%; margin-top:5px;" onclick="addMemberField('team2MembersContainer', 't2-member')">+ إضافة عضو للفريق 2</button>

        <button class="btn-primary" style="margin-top: 10px;" onclick="updateTeamData()">حفظ وتحديث الفرق على الشاشة</button>
    </div>

    <!-- تبويب 2: بنك الأسئلة والتحدي -->
    <div class="panel" id="tab1">
        <label>اختر الفئة وسؤال عشوائي:</label>
        <select id="categorySelect" onchange="loadRandomQuestion()">
            <option value="تاريخ وأمجاد">تاريخ وأمجاد</option>
            <option value="أمثال شعبية">أمثال شعبية</option>
            <option value="تحدي الذكاء">تحدي الذكاء</option>
        </select>

        <button class="btn-warning" onclick="loadRandomQuestion()">🎲 اسحب سؤال جديد تلقائياً</button>

        <label>متنافس من الفريق الأول:</label>
        <input type="text" id="player1Input" value="خالد">

        <label>متنافس من الفريق الثاني:</label>
        <input type="text" id="player2Input" value="صقر">

        <button class="btn-warning" onclick="sendNomination()">⚔️ بدء التحدي والتصادم</button>
        <button class="btn-primary" onclick="showQuestion()">📢 عرض السؤال</button>
        <button class="btn-success" onclick="showAnswer()">💡 إظهار الإجابة</button>
    </div>

    <!-- تبويب 3: النقاط -->
    <div class="panel" id="tab2">
        <label>نقاط الفريقين:</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="score1Input" value="0">
            <input type="number" id="score2Input" value="0">
        </div>
        <button class="btn-primary" onclick="updateScores()">تحديث النقاط</button>
    </div>

    <script>
        const channel = new BroadcastChannel('samra_game_channel');

        const questionBank = {
            "تاريخ وأمجاد": [
                {q: "في أي عام تأسست المملكة العربية السعودية الأولى؟", a: "عام 1139 هـ (1727 م)"},
                {q: "ما هي عاصمة الدولة السعودية الثانية؟", a: "الرياض"}
            ],
            "أمثال شعبية": [
                {q: "كمل المثل: اللي ما يعرف الصقر...", a: "يشويه"},
                {q: "كمل المثل: من طقطق لـ...", a: "سلام عليكم"}
            ],
            "تحدي الذكاء": [
                {q: "ما هو الشيء الذي كلما أخذت منه كبر؟", a: "الحفرة"},
                {q: "شيء بحجم الكف ولكن يملأ الغرفة، فما هو؟", a: "المصباح / الشمعة"}
            ]
        };

        function switchTab(index) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab' + index).classList.add('active');
            document.querySelectorAll('.tab-btn')[index].classList.add('active');
        }

        function addMemberField(containerId, className) {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'member-row';
            div.innerHTML = `<input type="text" class="${className}" placeholder="اسم العضو"><button class="btn-small btn-remove" onclick="removeRow(this)">-</button>`;
            container.appendChild(div);
        }

        function removeRow(btn) {
            btn.parentElement.remove();
        }

        let currentQ = "", currentA = "";
        function loadRandomQuestion() {
            const cat = document.getElementById('categorySelect').value;
            const list = questionBank[cat];
            const rand = list[Math.floor(Math.random() * list.length)];
            currentQ = rand.q;
            currentA = rand.a;
        }
        loadRandomQuestion();

        function updateTeamData() {
            const t1Members = Array.from(document.querySelectorAll('.t1-member')).map(input => input.value).filter(val => val.trim() !== "");
            const t2Members = Array.from(document.querySelectorAll('.t2-member')).map(input => input.value).filter(val => val.trim() !== "");

            channel.postMessage({
                action: 'UPDATE_TEAM_DATA',
                t1: document.getElementById('team1Name').value,
                t2: document.getElementById('team2Name').value,
                m1: t1Members,
                m2: t2Members
            });
            alert("تم تحديث الفرق والأعضاء بنجاح!");
        }

        function sendNomination() {
            channel.postMessage({
                action: 'NOMINATE',
                cat: document.getElementById('categorySelect').value,
                p1: document.getElementById('player1Name') ? document.getElementById('player1Name').value : document.getElementById('player1Input').value,
                p2: document.getElementById('player2Name') ? document.getElementById('player2Name').value : document.getElementById('player2Input').value
            });
        }

        function showQuestion() {
            channel.postMessage({ action: 'SHOW_Q', q: currentQ, a: currentA });
        }

        function showAnswer() {
            channel.postMessage({ action: 'SHOW_A' });
        }

        function updateScores() {
            channel.postMessage({
                action: 'SCORE',
                s1: document.getElementById('score1Input').value,
                s2: document.getElementById('score2Input').value
            });
        }
    </script>
</body>
</html>
