<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريموت تحدي السمرة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Tajawal', sans-serif;
            padding: 15px;
            text-align: center;
        }
        h2 { color: #ffd700; }
        .section {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button.blue { background: #2ed573; }
        button.yellow { background: #ffa502; color: #000; }
        button.purple { background: #9b59b6; }
        .score-btns { display: flex; justify-content: space-between; }
        .score-btns button { width: 48%; }
    </style>
</head>
<body>

    <h2>🎮 ريموت تحكم السمرة</h2>

    <!-- تحكم النقاط -->
    <div class="section">
        <h3>النقاط</h3>
        <div class="score-btns">
            <button class="blue" onclick="modifyScore(1, 1)">فريق 1 (+)</button>
            <button class="blue" onclick="modifyScore(2, 1)">فريق 2 (+)</button>
        </div>
        <div class="score-btns">
            <button onclick="modifyScore(1, -1)">فريق 1 (-)</button>
            <button onclick="modifyScore(2, -1)">فريق 2 (-)</button>
        </div>
    </div>

    <!-- التحكم بالأزرار النارية -->
    <div class="section">
        <h3>الأزرار النارية الخارقة</h3>
        <button class="purple" onclick="triggerAlert('سرقوها عينك عينك! 🔄')">🔄 زر السرقة</button>
        <button class="yellow" onclick="triggerAlert('🎡 عجلة الحظ: دبل النقاط!')">🎡 عجلة الحظ</button>
        <button class="purple" onclick="triggerAlert('🤝 واااسطة من الحكم!')">🤝 زر الواسطة</button>
        <button class="yellow" onclick="triggerAlert('⏱️ عداد ال10 ثواني اشتغل!')">⏱️ العداد السريع</button>
        <button class="purple" onclick="triggerAlert('🔥 وضع الدبل مفعل!')">🔥 دبل النقاط</button>
    </div>

    <!-- إدارة الأسئلة -->
    <div class="section">
        <h3>أمثلة سريعة للأسئلة</h3>
        <button onclick="setQuestion('دراما كويتية', 'وش اسم الشخصية الشهيرة التي لعبها عبدالحسين عبدالرضا في درب الزلق؟', 'حسين بن عاقول')">سؤال: مسلسلات كويتية</button>
        <button onclick="setQuestion('ون بيس (قسم مجانين الأنمي)', 'وش الاسم الحقيقي لساو لو عم روبين، وما رتبته السابقة؟', 'دير كلوفر / نائب الأدميرال جاغوار دي ساو')">🏴‍☠️ سؤال ون بيس الصعب</button>
        <button onclick="setQuestion('سيارات التسعينات', 'وش اللقب المشهور لسيارة كابريس التسعينات بالخليج؟', 'الصابونة')">سؤال: سيارات</button>
        
        <button class="blue" onclick="showAnswer()">إظهار / إخفاء الإجابة</button>
    </div>

    <script>
        function modifyScore(team, val) {
            let key = 'score' + team;
            let current = parseInt(localStorage.getItem(key) || 0);
            localStorage.setItem(key, Math.max(0, current + val));
        }

        function setQuestion(cat, q, a) {
            localStorage.setItem('current_category', cat);
            localStorage.setItem('current_question', q);
            localStorage.setItem('current_answer', a);
            localStorage.setItem('show_answer', 'false');
        }

        function showAnswer() {
            let current = localStorage.getItem('show_answer');
            localStorage.setItem('show_answer', current === 'true' ? 'false' : 'true');
        }

        function triggerAlert(msg) {
            localStorage.setItem('alert_msg', msg);
        }
    </script>
</body>
</html>
