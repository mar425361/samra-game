<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريموت لعبة السمرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f172a; color: #fff; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        h2 { color: #f59e0b; }
        .status { font-size: 1rem; color: #38bdf8; }
        .box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; text-align: right; border: 1px solid #3b82f6; }
        .ans-box { color: #10b981; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }
        .btn { width: 100%; padding: 18px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; margin-top: 5px; }
        .btn-next { background: #3b82f6; color: white; }
        .btn-show { background: #10b981; color: white; }
        .btn-score { background: #f59e0b; color: #000; width: 48%; }
        .score-btns { display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <h2>📱 ريموت المقدم</h2>
    <div class="status" id="connStatus">جاري الاتصال بالشاشة... ⏳</div>

    <div class="box">
        <div id="mCategory" style="color:#38bdf8; font-weight:bold;">التصنيف</div>
        <div id="mQuestion" style="font-size:1.1rem; margin-top:5px;">اضغط "سحب سؤال" للبدء</div>
        <div id="mAnswer" class="ans-box">💡 الإجابة المخفية: -</div>
    </div>

    <button class="btn btn-next" onclick="nextQ()">🎲 سحب سؤال جديد</button>
    <button class="btn btn-show" onclick="showA()">👁️ إظهار الإجابة للشاشة</button>

    <hr style="opacity: 0.2; margin: 10px 0;">

    <h3>النقاط:</h3>
    <div class="score-btns">
        <button class="btn btn-score" onclick="addScore(1)">+10 فريق 1</button>
        <button class="btn btn-score" onclick="addScore(2)">+10 فريق 2</button>
    </div>

    <script>
        const roomId = new URLSearchParams(window.location.search).get('room');
        let questionsData = {};
        let s1 = 0, s2 = 0;

        fetch('questions.json').then(r => r.json()).then(d => questionsData = d);

        const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "mobile_" + parseInt(Math.random() * 10000, 10));

        client.connect({
            onSuccess: function () {
                document.getElementById('connStatus').innerText = "متصل بالشاشة! 🟢";
                document.getElementById('connStatus').style.color = "#10b981";
            },
            useSSL: true
        });

        function sendCmd(data) {
            if (roomId && client.isConnected()) {
                const message = new Paho.MQTT.Message(JSON.stringify(data));
                message.destinationName = roomId;
                client.send(message);
            }
        }

        function nextQ() {
            const cats = Object.keys(questionsData);
            if (!cats.length) return;
            const cat = cats[Math.floor(Math.random() * cats.length)];
            const list = questionsData[cat];
            const qObj = list[Math.floor(Math.random() * list.length)];

            document.getElementById('mCategory').innerText = cat;
            document.getElementById('mQuestion').innerText = qObj.q;
            document.getElementById('mAnswer').innerText = "💡 الإجابة المخفية: " + qObj.a;

            sendCmd({ action: 'SET_Q', cat: cat, q: qObj.q, a: qObj.a });
        }

        function showA() {
            sendCmd({ action: 'SHOW_A' });
        }

        function addScore(team) {
            if (team === 1) s1 += 10;
            if (team === 2) s2 += 10;
            sendCmd({ action: 'SCORE', s1: s1, s2: s2 });
        }
    </script>
</body>
</html>
