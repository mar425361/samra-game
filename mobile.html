<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريموت لعبة السمرة</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body {
            background: #0f172a; color: #fff; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; gap: 20px; text-align: center;
        }
        h2 { color: #f59e0b; margin-bottom: 20px; font-size: 2rem; }
        .btn {
            width: 100%; max-width: 350px; padding: 25px; font-size: 1.5rem;
            font-weight: bold; border: none; border-radius: 16px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-next { background: #3b82f6; color: white; }
        .btn-answer { background: #10b981; color: white; }
    </style>
</head>
<body>

    <h2>📱 ريموت التحكم للشاشة</h2>

    <button class="btn btn-next" onclick="send('NEXT_QUESTION')">🎲 سؤال جديد للشاشة</button>
    <button class="btn btn-answer" onclick="send('SHOW_ANSWER')">💡 إظهار الإجابة</button>

    <script>
        const channel = new BroadcastChannel('samra_game_channel');
        function send(actionType) {
            channel.postMessage({ action: actionType });
        }
    </script>
</body>
</html>
